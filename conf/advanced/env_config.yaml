# =============================================
# Optimal Execution 환경 Configuration
# =============================================

env:
  total_shares: 1000         # 에피소드당 총 체결 물량
  max_steps: 100             # 에피소드 최대 스텝
  n_actions: 11              # 이산 행동 수 (0%, 10%, ..., 100%)
  impact_coeff: 0.1          # 선형 시장 충격 계수 (η)
  terminal_penalty_bps: 10.0 # 미체결 잔량 페널티 (bps)

lob_generator:
  initial_price: 50000.0     # 시작 중간가 (원)
  tick_size: 50.0            # 호가 단위 (MVP: 고정)
  n_levels: 10               # LOB 레벨 수
  변동성: 0.2            # 연간 변동성
  dt: 1.0                    # 스냅샷 간격 (초)
  base_volume: 500.0         # best quote 평균 물량
