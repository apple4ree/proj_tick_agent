# ==============================================
# BASELINE 실험 설정
# ==============================================
# 모든 실험의 기준점이 되는 표준 설정입니다.
# 실험 간 공정한 비교를 위해 이 설정을 기준으로 하나의 변수만 변경하세요.
#
# 사용법:
#   backtest_strategy_universe.py 또는 backtest.py의 기본 파라미터 참조용
#
# 버전: 1.0.0
# 최종 수정: 2026-03-16

# ==============================================
# 실험 메타데이터
# ==============================================
experiment:
  name: "baseline_v1"
  description: "KRX Samsung Electronics tick-level baseline"
  version: "1.0.0"

# ==============================================
# 데이터 설정 (고정)
# ==============================================
data:
  symbol: "005930"              # 삼성전자
  start_date: "2026-03-13"      # 데이터 시작일
  end_date: "2026-03-13"        # 데이터 종료일 (단일 거래일)
  resample: "1s"                # 1초 리샘플링 (틱 → 캔들)
  trade_lookback: 100           # 체결 히스토리 윈도우

# ==============================================
# 포트폴리오 설정 (고정)
# ==============================================
portfolio:
  initial_cash: 100000000       # 1억 KRW
  seed: 42                      # 재현성을 위한 고정 시드

# ==============================================
# 수수료 모델 (고정)
# ==============================================
fee:
  type: "krx"
  commission_bps: 1.5           # 편도 15bp (왕복 30bp)
  market: "KOSPI"
  include_tax: true             # 증권거래세 포함 (매도 시 18-20bp)

# ==============================================
# 시장 충격 모델 (고정)
# ==============================================
impact:
  type: "linear"
  eta: 0.1                      # 일시적 충격 계수
  gamma: 0.01                   # 영구적 충격 계수

# ==============================================
# 레이턴시 모델 (고정)
# ==============================================
latency:
  profile: "default"            # 일반 기관 투자자 프로필
  add_jitter: true
  jitter_std_ms: 0.1

# ==============================================
# 거래소 시뮬레이션 (고정)
# ==============================================
exchange:
  exchange_model: "partial_fill"
  queue_model: "prob_queue"
  queue_position_assumption: 0.5

# ==============================================
# 주문 분할 (고정)
# ==============================================
slicing:
  algo: "TWAP"
  interval_seconds: 30.0

# ==============================================
# 주문 배치 (고정)
# ==============================================
placement:
  style: "spread_adaptive"
  aggression_spread_threshold_bps: 5.0
  imbalance_threshold: 0.3

# ==============================================
# 리스크 제한 (고정)
# ==============================================
risk:
  max_gross_notional: null      # initial_cash와 동일
  max_position: 1000
  default_size: 100
  target_mode: "signal_proportional"

# ==============================================
# 평가 설정
# ==============================================
evaluation:
  compute_attribution: true
  annualization_factor: 252

# ==============================================
# Walk-Forward 검증 (선택적)
# ==============================================
walk_forward:
  enabled: false
  train_window: 3000
  val_window: 500
  test_window: 0
  embargo_periods: 50
  purge_periods: 10
