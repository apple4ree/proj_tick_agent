# ==============================================
# MINI BASELINE - 빠른 반복용
# ==============================================
# 개발/디버깅용 축소 데이터셋
# 프로덕션 실험은 conf/advanced/baseline.yaml 사용

experiment:
  name: "baseline_mini"
  description: "Mini baseline for quick iteration"
  version: "1.0.0"

data:
  symbol: "005930"
  start_date: "2026-03-13"
  end_date: "2026-03-13"
  resample: "10s"               # 10초 리샘플링 (1초 대비 10배 축소)
  trade_lookback: 50

portfolio:
  initial_cash: 100000000
  seed: 42

fee:
  type: "krx"
  commission_bps: 1.5
  market: "KOSPI"
  include_tax: true

impact:
  type: "linear"
  eta: 0.1
  gamma: 0.01

latency:
  profile: "default"
  add_jitter: true
  jitter_std_ms: 0.1

exchange:
  exchange_model: "partial_fill"
  queue_model: "prob_queue"
  queue_position_assumption: 0.5

slicing:
  algo: "TWAP"
  interval_seconds: 30.0

placement:
  style: "spread_adaptive"
  aggression_spread_threshold_bps: 5.0
  imbalance_threshold: 0.3

risk:
  max_gross_notional: null
  max_position: 1000
  default_size: 100
  target_mode: "signal_proportional"

evaluation:
  compute_attribution: false    # 속도 향상
  annualization_factor: 252
