# =============================================
# 학습 설정(Phase 2에서 사용)
# =============================================

algorithm: ppo              # ppo | sac | dqn

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  total_timesteps: 1_000_000

evaluation:
  n_eval_episodes: 100
  eval_freq: 10_000          # 매 N 스텝마다 평가
  n_seeds: 5                 # 통계적 유의성을 위한 시드 수

logging:
  tensorboard: true
  log_dir: logs/
  checkpoint_freq: 50_000
  checkpoint_dir: checkpoints/
