# ==============================================
# 백테스트 코어 설정 (qlib 스타일, PipelineRunner 전용)
# ==============================================
# ⚠ 이 파일은 load_config()의 기본 config stack에 포함되지 않습니다.
# BacktestConfig.from_yaml("conf/backtest_core.yaml")로 직접 로드하는
# 상세 설정 템플릿으로, worker/submit 흐름과는 별도입니다.
#
# config stack 기본값 → backtest_base.yaml + backtest_worker.yaml

# --- 유니버스 및 기간 ---
symbol: "005930"
start_date: "2026-03-13"
end_date: "2026-03-13"

# --- 포트폴리오 ---
initial_cash: 100000000  # KRW (1e8)
seed: 42

# --- 수수료 모델 ---
fee:
  type: krx              # krx | zero
  commission_bps: 1.5    # bps (both sides)
  market: KOSPI          # KOSPI | KOSDAQ
  include_tax: true      # Securities transaction tax on sells (18-20 bps)

# --- 시장 충격 ---
impact:
  type: linear           # linear | sqrt | zero
  eta: 0.1               # temporary impact coefficient
  gamma: 0.01            # permanent impact coefficient
  # sqrt 모델 전용:
  # sigma: 0.01          # 변동성
  # kappa: 0.1           # 일시적 계수

# --- 지연 ---
latency:
  profile: default       # default | zero | colocation | retail
  add_jitter: true
  jitter_std_ms: 0.1
  # 개별 구성요소 덮어쓰기(선택 사항):
  # order_submit_ms: 0.5
  # order_ack_ms: 1.0
  # cancel_ms: 0.3
  # market_data_delay_ms: 0.2

# --- 거래소 시뮬레이션 ---
exchange:
  exchange_model: partial_fill     # partial_fill | no_partial_fill
  queue_model: prob_queue          # price_time | risk_adverse | prob_queue | pro_rata | random
  queue_position_assumption: 0.5   # 0.0 = front of queue, 1.0 = back

# --- 주문 분할 ---
slicing:
  algo: TWAP                       # TWAP | VWAP | POV | AC
  interval_seconds: 30.0           # TWAP slice interval
  participation_rate: 0.05         # POV rate
  # Almgren-Chriss 파라미터:
  # ac_eta: 0.1
  # ac_gamma: 0.01
  # ac_sigma: 0.01
  # ac_T: 100

# --- 배치 ---
placement:
  style: spread_adaptive           # spread_adaptive | aggressive | passive
  aggression_spread_threshold_bps: 5.0
  imbalance_threshold: 0.3
  use_market_orders: false
  # 수동형 placement only:
  # offset_ticks: 0
  # tick_size: 1.0

# --- 리스크 및 목표 수량 결정 ---
risk:
  max_gross_notional: null         # 기본값은 initial_cash
  max_position: 1000               # 심볼별 최대 주식 수
  default_size: 100                # 기본 주문 수량
  target_mode: signal_proportional # signal_proportional | fixed_size | Kelly

# --- 평가 ---
compute_attribution: true
annualization_factor: 252
