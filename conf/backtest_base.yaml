# ==============================================
# 백테스트 공통 기본값 (Core Defaults)
# ==============================================
# load_config()가 기본 config stack의 일부로 자동 로드합니다.
# 스크립트, 워커, PipelineRunner 모두가 이 값을 공유합니다.
#
# 워커/오케스트레이션 전용 설정 → backtest_worker.yaml
# qlib 스타일 상세 설정 (config stack 미포함) → advanced/backtest_core.yaml

backtest:
  initial_cash: 100000000        # KRW (1e8)
  seed: 42
  # Supported resample resolutions (current phase):
  #   "1s"    — default public baseline
  #   "500ms" — the only realism-oriented resolution in this phase
  # Other sub-second values (100ms, 250ms, …) are NOT supported.
  resample: "1s"
  trade_lookback: 100

  # 단일 백테스트 기본값
  # NOTE: latency_ms is a compatibility alias for venue lifecycle latency
  # (milliseconds), NOT the tick interval.
  # Tick interval is derived from `resample` above (1s → 1000ms, 500ms → 500ms).
  # cancel_after_ticks uses the tick interval, not latency_ms.
  # Alias mapping (when nested latency fields are omitted):
  #   order_submit_ms = latency_ms * 0.3
  #   order_ack_ms    = latency_ms * 0.7
  #   cancel_ms       = latency_ms * 0.2
  # This alias must NOT be used to derive market_data_delay_ms.
  latency_ms: 100.0
  fee_model: krx
  impact_model: linear
  slicing_algo: TWAP
  placement_style: spread_adaptive
  exchange_model: partial_fill
  # Queue models (handled by FillSimulator):
  queue_model: prob_queue
  queue_position_assumption: 0.5
  # Observation lag: strategy sees market data delayed by this amount (ms).
  # 0.0 = no delay (current behavior). Actual past-state lookup, not timestamp shift.
  # At "1s" resolution, small delays (< 1000ms) often collapse to the same state.
  # At "500ms" resolution, moderate delays (>= 200ms) yield distinct observed_state.
  market_data_delay_ms: 0.0
  # Decision latency: strategy compute time between seeing a state and acting (ms).
  # 0.0 = instant. Separate from observation lag (which state is seen) and
  # order submission latency (how long the venue takes to receive the order).
  # Effective lookup delay = market_data_delay_ms + decision_compute_ms.
  decision_compute_ms: 0.0
  compute_attribution: true
